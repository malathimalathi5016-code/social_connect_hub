<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search Influencers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-top">
      <h1>Find Influencers</h1>
      <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>
    </div>
    <div id="welcome"></div>
    
     <nav>
        <a href="index.html">Home</a>
        <a href="upload.html">Upload Profile</a>
        <a href="search.html">Search</a>
        <a href="profiles.html">All Profiles</a>
        <a href="favorites.html">Favorites</a>
        <a href="register.html">Register</a>
        <a href="login.html">Login</a>
        <a href="logout.html" id="logoutLink" style="display: none;">Logout</a>
     </nav>


  </header>

  <section id="searchSection">
    <section class="search-box">
      <input type="text" id="searchInput" placeholder="Search by name">
      <select id="platformFilter">
        <option value="">All Platforms</option>
        <option value="Instagram">Instagram</option>
        <option value="YouTube">YouTube</option>
        <option value="Facebook">Facebook</option>
      </select>
      <input type="number" id="minFollowers" placeholder="Min Followers">
      <input type="text" id="keywordFilter" placeholder="Keyword in promotions (e.g., fashion, tech)">
      <button onclick="searchInfluencers()">Search</button>
    </section>

    <section class="sort-options">
      <h3>Sort by Followers:</h3>
      <button onclick="sortInfluencers('asc')">Ascending</button>
      <button onclick="sortInfluencers('desc')">Descending</button>
    </section>

    <section id="results"></section>
  </section>

  <section class="login-required" id="loginRequired" style="display: none;">
    <div class="hero">
      <h2>Login Required</h2>
      <p>You need to be logged in to search for influencers.</p>
      <p>Please log in to your account to continue.</p>
      <button onclick="location.href='login.html'">Login Now</button>
    </div>
  </section>

  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/search.js"></script>
</body>
</html>
